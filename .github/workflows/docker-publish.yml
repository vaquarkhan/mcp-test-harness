# Publish OCI images to GitHub Container Registry (GHCR) when a version tag is pushed.
# Repo setting: Settings → Actions → General → Workflow permissions → Read and write (for GITHUB_TOKEN → packages).
name: docker-publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Image name (lowercase for GHCR)
        id: img
        shell: bash
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Semver from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: runtime
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:latest

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: dev
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:${{ steps.ver.outputs.version }}-dev
            ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:dev
