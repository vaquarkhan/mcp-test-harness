# Publishes ONE optional wheel under packages/<name>/ to PyPI.
# Tag format: pkg-<directory-name>  e.g. pkg-mcp-test-harness-openai
# NOT pkg-1.0.1 (that resolves to packages/1.0.1 — use v1.0.1 for the main package).
name: publish-packages

on:
  push:
    tags:
      - "pkg-*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package directory name under packages/"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Determine package
        id: pkg
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/pkg-}"
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify package directory exists
        run: |
          NAME="${{ steps.pkg.outputs.name }}"
          if [ ! -d "packages/$NAME" ]; then
            echo "::error::packages/$NAME is not a directory."
            echo "The part after pkg- must be a folder name under packages/, not a version number."
            echo "Examples of valid tags: pkg-mcp-test-harness-openai  pkg-mcp-test-harness-anthropic"
            echo "For the main mcp-test-harness project use a v* tag (e.g. v1.0.1) → workflow publish.yml, not publish-packages.yml."
            echo "Existing package directories:"
            ls -1 packages/ || true
            exit 1
          fi
      - name: Build package
        run: |
          pip install build
          python -m build packages/${{ steps.pkg.outputs.name }}
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ steps.pkg.outputs.name }}/dist/
