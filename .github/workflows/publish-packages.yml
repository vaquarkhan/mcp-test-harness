name: publish-packages

on:
  push:
    tags:
      - "pkg-*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package directory name under packages/"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Determine package
        id: pkg
        run: |
          if [ -n "${{ inputs.package }}" ]; then
            echo "name=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/pkg-}"
            echo "name=$TAG" >> "$GITHUB_OUTPUT"
          fi
      - name: Build package
        run: |
          pip install build
          python -m build packages/${{ steps.pkg.outputs.name }}
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ steps.pkg.outputs.name }}/dist/
