# Quick = every PR (seconds). Full = main branch + manual (installs all deps).
name: validate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quick:
    name: Quick (no MCP-Bastion / no torch)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install harness runtime + test deps (matches core deps, not Bastion)
        run: |
          python -m pip install --upgrade pip
          pip install "mcp>=1.0.0" "pyyaml>=6.0" "jsonschema>=4.0" "anyio>=4.0" pytest pytest-asyncio
      - name: Offline pyproject checks
        run: python -m pytest tests/test_pyproject.py -q
      - name: All harness unit tests (excludes mcplint/Bastion smoke — needs full install)
        run: python -m pytest tests/ --ignore=tests/test_workspace.py -q

  full:
    name: Full (all dependencies + all tests)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install everything
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify dependency imports
        run: python scripts/verify_upstream.py
      - name: All tests
        run: python -m pytest tests/ -q
      - name: Verify mcp-test CLI
        run: mcp-test --version
