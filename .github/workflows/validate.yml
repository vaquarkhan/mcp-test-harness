# Quick = every PR (seconds). Full = main branch + manual (installs all deps).
name: validate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quick:
    name: Quick (offline checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pyyaml jsonschema anyio
      - name: Offline pyproject checks
        run: python -m pytest tests/test_pyproject.py -q
      - name: Harness unit tests (no server needed)
        run: |
          python -m pytest tests/test_config.py tests/test_parser.py \
            tests/test_discovery.py tests/test_fixtures.py \
            tests/test_schema.py tests/test_reporting.py \
            tests/test_transport.py tests/test_plugins.py \
            tests/test_executor.py tests/test_lifecycle.py \
            tests/test_scheduler.py tests/test_assertions.py \
            tests/test_snapshots.py tests/test_cli.py -q

  full:
    name: Full (all dependencies + all tests)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install everything
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify dependency imports
        run: python scripts/verify_upstream.py
      - name: All tests
        run: python -m pytest tests/ -q
      - name: Verify mcp-test CLI
        run: mcp-test --version
