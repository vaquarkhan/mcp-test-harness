name: "MCP Test Harness"
description: "Run MCP server tests using the mcp-test-harness framework"

inputs:
  server-command:
    description: "Shell command to start the MCP server under test"
    required: false
    default: ""
  transport:
    description: "Transport type: stdio, sse, or http"
    required: false
    default: "stdio"
  test-directory:
    description: "Path to the test directory or file"
    required: false
    default: "tests/"
  config-file:
    description: "Path to mcp-test.yaml or mcp-test.toml config file"
    required: false
    default: ""
  report-format:
    description: "Report output format: json or junit"
    required: false
    default: "junit"
  harness-version:
    description: "Version of mcp-test-harness to install (e.g. 1.0.0). Defaults to latest."
    required: false
    default: "latest"

outputs:
  test-result:
    description: "Test result: pass or fail"
    value: ${{ steps.run-tests.outputs.test-result }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: "3.12"

    - name: Install MCP Test Harness
      shell: bash
      env:
        HARNESS_VERSION: ${{ inputs.harness-version }}
      run: |
        python -m pip install --upgrade pip
        if [ "$HARNESS_VERSION" = "latest" ]; then
          pip install mcp-test-harness
        else
          pip install "mcp-test-harness==$HARNESS_VERSION"
        fi

    - name: Run MCP tests
      id: run-tests
      shell: bash
      env:
        INPUT_SERVER_COMMAND: ${{ inputs.server-command }}
        INPUT_TRANSPORT: ${{ inputs.transport }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_REPORT_FORMAT: ${{ inputs.report-format }}
        INPUT_TEST_DIRECTORY: ${{ inputs.test-directory }}
      run: |
        set +e

        ARGS=()

        if [ -n "$INPUT_SERVER_COMMAND" ]; then
          ARGS+=(--server-command "$INPUT_SERVER_COMMAND")
        fi

        ARGS+=(--transport "$INPUT_TRANSPORT")

        if [ -n "$INPUT_CONFIG_FILE" ]; then
          ARGS+=(--config "$INPUT_CONFIG_FILE")
        fi

        ARGS+=(--report-format "$INPUT_REPORT_FORMAT")

        if [ "$INPUT_REPORT_FORMAT" = "junit" ]; then
          ARGS+=(--report-output "mcp-test-report.xml")
        else
          ARGS+=(--report-output "mcp-test-report.json")
        fi

        ARGS+=("$INPUT_TEST_DIRECTORY")

        mcp-test "${ARGS[@]}"
        EXIT_CODE=$?

        if [ "$EXIT_CODE" -eq 0 ]; then
          echo "test-result=pass" >> "$GITHUB_OUTPUT"
        else
          echo "test-result=fail" >> "$GITHUB_OUTPUT"
        fi

        exit "$EXIT_CODE"

    - name: Upload JUnit XML report
      if: always() && inputs.report-format == 'junit'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: mcp-test-report
        path: mcp-test-report.xml
        if-no-files-found: ignore
