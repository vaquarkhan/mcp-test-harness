server:
  command: "python -m your_server"

schema_validation: true

tests:
  roots:
    - "examples/feature-demo/functional-testing"

reports:
  - format: json
    output: "examples/feature-demo/functional-testing/reports/functional-demo.json"
  - format: junit
    output: "examples/feature-demo/functional-testing/reports/functional-demo.xml"
  - format: html
    output: "examples/feature-demo/functional-testing/reports/functional-demo.html"
