# SSE transport — replace URL and path with your running MCP server
server:
  command: "http://127.0.0.1:3000"
  transport: sse
  transport_options:
    host: 127.0.0.1
    port: 3000
    path: /mcp
    headers:
      Authorization: "Bearer replace-me"
test:
  dirs:
    - tests/
  timeout: 60
schema_validation: true
plugins: []
